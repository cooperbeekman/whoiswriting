<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>whoiswriting — Cole Ryan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at 50% 38%,#eceae7,#d9d6d1);overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:none;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
canvas#c{position:fixed;top:0;left:0;width:100vw;height:100vh;cursor:grab}
canvas#c.grabbing{cursor:grabbing}
.hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);color:#a8a29e;font-size:13px;letter-spacing:.06em;font-weight:300;pointer-events:none;z-index:1;opacity:.8}
.grab-dot{position:fixed;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.07);border:2px solid rgba(0,0,0,.12);pointer-events:none;transform:translate(-50%,-50%);z-index:2;display:none;box-shadow:0 0 16px rgba(0,0,0,.05)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="grab-dot" id="dot"></div>
<p class="hint">Grab and drag the receipt</p>
<script>
"use strict";

var COLS = 35, ROWS = 70;
var CW = 3.0, CH = 6.0;
var NX = COLS + 1, NY = ROWS + 1, NP = NX * NY;
var GRAV = 0.0028, DAMP = 0.985, ITERS = 20;
var GRAB_RAD = 1.3;

/* ═══════════════════════════════════════════
   Paper Background (generated once)
   ═══════════════════════════════════════════ */

var TEX_W = 1024, TEX_H = 2048;
var paperBg = document.createElement("canvas");
paperBg.width = TEX_W; paperBg.height = TEX_H;
(function buildPaper() {
  var x = paperBg.getContext("2d");
  x.fillStyle = "#f6f2eb"; x.fillRect(0, 0, TEX_W, TEX_H);
  var id = x.getImageData(0, 0, TEX_W, TEX_H), d = id.data;
  for (var py = 0; py < TEX_H; py++) {
    var fiber = (Math.sin(py * 0.3) * 0.5 + Math.sin(py * 1.7 + 3) * 0.3) * 2.5;
    for (var px = 0; px < TEX_W; px++) {
      var p = (py * TEX_W + px) * 4;
      var n = (Math.random() - 0.5) * 12 + Math.sin(px * 0.02 + py * 0.01) * 3 + fiber;
      d[p] += n; d[p+1] += n - 0.5; d[p+2] += n - 1.5;
    }
  }
  x.putImageData(id, 0, 0);
  for (var row = 0; row < TEX_H; row += 3) {
    x.fillStyle = "rgba(0,0,0," + (0.008 + Math.random() * 0.012) + ")";
    x.fillRect(0, row, TEX_W, 1);
  }
  var g = x.createLinearGradient(0, 0, 0, TEX_H);
  g.addColorStop(0, "rgba(245,241,234,0)"); g.addColorStop(.93, "rgba(245,241,234,0)"); g.addColorStop(1, "rgba(200,195,185,.45)");
  x.fillStyle = g; x.fillRect(0, 0, TEX_W, TEX_H);
  var g2 = x.createLinearGradient(0, 0, 0, 40);
  g2.addColorStop(0, "rgba(180,175,165,.15)"); g2.addColorStop(1, "rgba(245,241,234,0)");
  x.fillStyle = g2; x.fillRect(0, 0, TEX_W, 40);
  var gL = x.createLinearGradient(0, 0, 25, 0);
  gL.addColorStop(0, "rgba(180,175,165,.1)"); gL.addColorStop(1, "rgba(245,241,234,0)");
  x.fillStyle = gL; x.fillRect(0, 0, 25, TEX_H);
  var gR = x.createLinearGradient(TEX_W, 0, TEX_W - 25, 0);
  gR.addColorStop(0, "rgba(180,175,165,.1)"); gR.addColorStop(1, "rgba(245,241,234,0)");
  x.fillStyle = gR; x.fillRect(TEX_W - 25, 0, 25, TEX_H);
})();

/* ═══════════════════════════════════════════
   Receipt Text Rendering
   ═══════════════════════════════════════════ */

var articles = [];
var receiptCv = document.createElement("canvas");
receiptCv.width = TEX_W; receiptCv.height = TEX_H;
var receiptCtx = receiptCv.getContext("2d");

function drawReceipt() {
  var x = receiptCtx, W = TEX_W, H = TEX_H, S = 2;
  x.clearRect(0, 0, W, H);
  x.drawImage(paperBg, 0, 0);
  x.textBaseline = "top"; x.fillStyle = "#1a1a1a";
  var y = 70, lh = 48, mg = 85;

  function ctr(t, font, col) {
    x.font = font || (15*S)+"px 'Courier New',monospace";
    if (col) x.fillStyle = col; x.textAlign = "center"; x.fillText(t, W/2, y);
    x.fillStyle = "#1a1a1a"; y += lh;
  }
  function lft(t, col) {
    x.font = (13*S)+"px 'Courier New',monospace";
    if (col) x.fillStyle = col; x.textAlign = "left"; x.fillText(t, mg, y);
    x.fillStyle = "#1a1a1a"; y += lh;
  }
  function dash() {
    x.strokeStyle = "#bbb"; x.lineWidth = 1.5; x.setLineDash([6, 5]);
    x.beginPath(); x.moveTo(mg, y + lh * 0.35); x.lineTo(W - mg, y + lh * 0.35); x.stroke();
    x.setLineDash([]); y += lh * 0.85;
  }
  function thick() {
    x.fillStyle = "#2a2a2a"; x.fillRect(mg, y + 14, W - mg * 2, 4);
    x.fillStyle = "#1a1a1a"; y += lh;
  }

  // Header
  ctr("Cole Ryan", "bold " + (28*S) + "px 'Courier New',monospace");
  ctr("Essays & Writing", (14*S) + "px 'Courier New',monospace", "#666");
  ctr("coleryan.co", (13*S) + "px 'Courier New',monospace", "#999");
  y += 6; thick();

  // Live date
  var now = new Date();
  var pad = function(n) { return n < 10 ? "0" + n : "" + n; };
  var ds = now.getFullYear() + "-" + pad(now.getMonth()+1) + "-" + pad(now.getDate()) +
           "  " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
  ctr(ds, (14*S) + "px 'Courier New',monospace", "#555");
  ctr("Reader #04,271", (12*S) + "px 'Courier New',monospace", "#888");

  y += 4; dash(); y += 4;

  // Subscribe
  ctr("JOIN THE LIST", "bold " + (12*S) + "px 'Courier New',monospace", "#555");
  y += 4;
  x.font = (12*S) + "px 'Courier New',monospace"; x.fillStyle = "#999"; x.textAlign = "left";
  x.fillText("Email", mg, y);
  x.strokeStyle = "#c5c0b8"; x.lineWidth = 1.5; x.setLineDash([]);
  x.beginPath(); x.moveTo(mg + 100, y + 26); x.lineTo(W - mg, y + 26); x.stroke();
  y += lh + 4;

  thick();

  // Articles
  if (articles.length > 0) {
    ctr("ARTICLES", "bold " + (12*S) + "px 'Courier New',monospace", "#555");
    dash();

    for (var i = 0; i < articles.length; i++) {
      if (y > H - 180) {
        var rem = articles.length - i;
        if (rem > 0) ctr("+ " + rem + " more at coleryan.co", (11*S)+"px 'Courier New',monospace", "#aaa");
        break;
      }
      var a = articles[i];
      var num = (i + 1 < 10 ? "0" : "") + (i + 1);
      var title = a.subject || "Untitled";
      // Truncate title
      x.font = (13*S) + "px 'Courier New',monospace";
      while (x.measureText(num + "  " + title).width > W - mg * 2 && title.length > 10) {
        title = title.slice(0, -4) + "...";
      }
      lft(num + "  " + title);
      if (a.published_at) {
        var d = new Date(a.published_at);
        lft("    " + d.toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"}), "#aaa");
      }
      dash();
    }
  } else {
    ctr("ARTICLES", "bold " + (12*S) + "px 'Courier New',monospace", "#555");
    dash();
    ctr("Coming soon...", (13*S)+"px 'Courier New',monospace", "#aaa");
    dash();
  }

  // Footer
  thick();
  ctr("Thank you for reading!", (13*S) + "px 'Courier New',monospace", "#666");
  y += 0;
  ctr("@coleryan", (11*S) + "px 'Courier New',monospace", "#aaa");

  return receiptCv;
}

/* ═══════════════════════════════════════════
   Fetch Articles
   ═══════════════════════════════════════════ */

function fetchArticles() {
  fetch("https://api.kit.com/v4/broadcasts", {
    headers: { "X-Kit-Api-Key": "kit_e7c4221f7f3235265c45a327c301f926", "Content-Type": "application/json" }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    articles = (data.broadcasts || [])
      .filter(function(b) { return b.public && b.published_at; })
      .sort(function(a, b) { return new Date(b.published_at) - new Date(a.published_at); });
    uploadTexture();
  })
  .catch(function() { /* Use empty articles — receipt shows "Coming soon" */ });
}

/* ═══════════════════════════════════════════
   Particles
   ═══════════════════════════════════════════ */

var pos = new Float32Array(NP * 3);
var prv = new Float32Array(NP * 3);
var pin = new Uint8Array(NP);
var nrm = new Float32Array(NP * 3);
var uvs = new Float32Array(NP * 2);

for (var j = 0; j < NY; j++) for (var i = 0; i < NX; i++) {
  var idx = j * NX + i, i3 = idx * 3;
  var px = (i / COLS - 0.5) * CW, py = -(j / ROWS) * CH;
  var rz = (Math.random() - 0.5) * 0.015;
  pos[i3] = px; pos[i3+1] = py; pos[i3+2] = rz;
  prv[i3] = px; prv[i3+1] = py; prv[i3+2] = rz;
  uvs[idx*2] = i / COLS; uvs[idx*2+1] = j / ROWS;
  if (j === 0) pin[idx] = 1;
}

/* ═══════════════════════════════════════════
   Constraints
   ═══════════════════════════════════════════ */

var _cA = [], _cB = [], _cR = [];
function addC(a, b) {
  var dx = pos[a*3]-pos[b*3], dy = pos[a*3+1]-pos[b*3+1], dz = pos[a*3+2]-pos[b*3+2];
  _cA.push(a); _cB.push(b); _cR.push(Math.sqrt(dx*dx+dy*dy+dz*dz));
}
for (var j = 0; j < NY; j++) for (var i = 0; i < NX; i++) {
  var idx = j * NX + i;
  if (i < COLS) addC(idx, idx+1);
  if (j < ROWS) addC(idx, idx+NX);
  if (i < COLS && j < ROWS) addC(idx, idx+NX+1);
  if (i > 0 && j < ROWS) addC(idx, idx+NX-1);
  if (i+2 <= COLS) addC(idx, idx+2);
  if (j+2 <= ROWS) addC(idx, idx+2*NX);
}
var NC = _cA.length;
var cA = new Int32Array(_cA), cB = new Int32Array(_cB), cR = new Float32Array(_cR);

/* ═══════════════════════════════════════════
   Triangles
   ═══════════════════════════════════════════ */

var tri = new Uint16Array(COLS * ROWS * 6), ti = 0;
for (var j = 0; j < ROWS; j++) for (var i = 0; i < COLS; i++) {
  var tl = j * NX + i;
  tri[ti++]=tl; tri[ti++]=tl+NX; tri[ti++]=tl+1;
  tri[ti++]=tl+1; tri[ti++]=tl+NX; tri[ti++]=tl+NX+1;
}
var NI = ti;

/* ═══════════════════════════════════════════
   Matrix Helpers
   ═══════════════════════════════════════════ */

function m4(){var m=new Float32Array(16);m[0]=m[5]=m[10]=m[15]=1;return m;}
function persp(o,fov,a,n,f){var t=1/Math.tan(fov*.5),nf=1/(n-f);o.fill(0);o[0]=t/a;o[5]=t;o[10]=(f+n)*nf;o[11]=-1;o[14]=2*f*n*nf;}
function lookAt(o,e,c,u){var fx=c[0]-e[0],fy=c[1]-e[1],fz=c[2]-e[2];var l=Math.sqrt(fx*fx+fy*fy+fz*fz);fx/=l;fy/=l;fz/=l;var sx=fy*u[2]-fz*u[1],sy=fz*u[0]-fx*u[2],sz=fx*u[1]-fy*u[0];l=Math.sqrt(sx*sx+sy*sy+sz*sz);sx/=l;sy/=l;sz/=l;var ux=sy*fz-sz*fy,uy=sz*fx-sx*fz,uz=sx*fy-sy*fx;o[0]=sx;o[4]=sy;o[8]=sz;o[12]=-(sx*e[0]+sy*e[1]+sz*e[2]);o[1]=ux;o[5]=uy;o[9]=uz;o[13]=-(ux*e[0]+uy*e[1]+uz*e[2]);o[2]=-fx;o[6]=-fy;o[10]=-fz;o[14]=fx*e[0]+fy*e[1]+fz*e[2];o[3]=0;o[7]=0;o[11]=0;o[15]=1;}
function mul(o,a,b){for(var c=0;c<4;c++){var b0=b[c*4],b1=b[c*4+1],b2=b[c*4+2],b3=b[c*4+3];o[c*4]=a[0]*b0+a[4]*b1+a[8]*b2+a[12]*b3;o[c*4+1]=a[1]*b0+a[5]*b1+a[9]*b2+a[13]*b3;o[c*4+2]=a[2]*b0+a[6]*b1+a[10]*b2+a[14]*b3;o[c*4+3]=a[3]*b0+a[7]*b1+a[11]*b2+a[15]*b3;}}
function inv(o,m){var a=m[0],b=m[1],c=m[2],d=m[3],e=m[4],f=m[5],g=m[6],h=m[7],i=m[8],j=m[9],k=m[10],l=m[11],M=m[12],n=m[13],p=m[14],q=m[15];var t0=a*f-b*e,t1=a*g-c*e,t2=a*h-d*e,t3=b*g-c*f,t4=b*h-d*f,t5=c*h-d*g,t6=i*n-j*M,t7=i*p-k*M,t8=i*q-l*M,t9=j*p-k*n,tA=j*q-l*n,tB=k*q-l*p;var D=t0*tB-t1*tA+t2*t9+t3*t8-t4*t7+t5*t6;if(!D)return;D=1/D;o[0]=(f*tB-g*tA+h*t9)*D;o[1]=(c*tA-b*tB-d*t9)*D;o[2]=(n*t5-p*t4+q*t3)*D;o[3]=(k*t4-j*t5-l*t3)*D;o[4]=(g*t8-e*tB-h*t7)*D;o[5]=(a*tB-c*t8+d*t7)*D;o[6]=(p*t2-M*t5-q*t1)*D;o[7]=(i*t5-k*t2+l*t1)*D;o[8]=(e*tA-f*t8+h*t6)*D;o[9]=(b*t8-a*tA-d*t6)*D;o[10]=(M*t4-n*t2+q*t0)*D;o[11]=(j*t2-i*t4-l*t0)*D;o[12]=(f*t7-e*t9-g*t6)*D;o[13]=(a*t9-b*t7+c*t6)*D;o[14]=(n*t1-M*t3-p*t0)*D;o[15]=(i*t3-j*t1+k*t0)*D;}

/* ═══════════════════════════════════════════
   WebGL
   ═══════════════════════════════════════════ */

var canvas = document.getElementById("c"), dot = document.getElementById("dot");
var cssW = window.innerWidth, cssH = window.innerHeight;
var dpr = Math.min(window.devicePixelRatio || 1, 2);
canvas.width = Math.round(cssW * dpr); canvas.height = Math.round(cssH * dpr);
var gl = canvas.getContext("webgl", { antialias: true, alpha: false, powerPreference: "high-performance" });
gl.viewport(0, 0, canvas.width, canvas.height); gl.enable(gl.DEPTH_TEST); gl.disable(gl.CULL_FACE);
gl.clearColor(0.914, 0.906, 0.894, 1.0);

var VS = "attribute vec3 aP,aN;attribute vec2 aU;uniform mat4 uVP;varying vec3 vN,vW;varying vec2 vU;void main(){vN=aN;vU=aU;vW=aP;gl_Position=uVP*vec4(aP,1.);}";
var FS = [
  "precision highp float;varying vec3 vN,vW;varying vec2 vU;uniform sampler2D uT;uniform vec3 uEye;",
  "void main(){",
  "vec3 n=normalize(gl_FrontFacing?vN:-vN);",
  "vec3 L1=normalize(vec3(.45,.85,1.));vec3 L2=normalize(vec3(-.65,.25,.45));vec3 L3=normalize(vec3(.1,-.4,-.85));",
  "float d1=max(dot(n,L1),0.);float d2=max(dot(n,L2),0.);float d3=max(dot(n,L3),0.);",
  "float hemi=dot(n,vec3(0.,1.,0.))*.5+.5;float amb=mix(.44,.60,hemi);",
  "vec3 V=normalize(uEye-vW);vec3 H1=normalize(L1+V);float spec=pow(max(dot(n,H1),0.),50.)*.14;",
  "float flatF=abs(dot(n,vec3(0.,0.,1.)));float foldAO=mix(.85,1.,flatF);",
  "float sss=pow(max(dot(V,-L1),0.),4.)*.07;",
  "float fres=pow(1.-max(dot(V,n),0.),3.5)*.07;",
  "vec4 tx=texture2D(uT,vU);",
  "vec3 col=tx.rgb*(amb+d1*.42+d2*.10+d3*.05)*foldAO;",
  "col+=vec3(spec)+vec3(sss)*tx.rgb+vec3(fres)*vec3(.96,.94,.91);",
  "if(!gl_FrontFacing)col*=vec3(.76,.75,.74);",
  "float vig=smoothstep(0.,.06,vU.x)*smoothstep(1.,.94,vU.x)*smoothstep(0.,.03,vU.y)*smoothstep(1.,.97,vU.y);",
  "col*=mix(.88,1.,vig);gl_FragColor=vec4(col,1.);}"
].join("");

function mkS(type, src) { var s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; }
var prog = gl.createProgram(); gl.attachShader(prog, mkS(gl.VERTEX_SHADER, VS)); gl.attachShader(prog, mkS(gl.FRAGMENT_SHADER, FS)); gl.linkProgram(prog); gl.useProgram(prog);
var aP=gl.getAttribLocation(prog,"aP"),aN=gl.getAttribLocation(prog,"aN"),aU=gl.getAttribLocation(prog,"aU");
var uVP=gl.getUniformLocation(prog,"uVP"),uT=gl.getUniformLocation(prog,"uT"),uEye=gl.getUniformLocation(prog,"uEye");
gl.enableVertexAttribArray(aP); gl.enableVertexAttribArray(aN); gl.enableVertexAttribArray(aU);

var posBuf=gl.createBuffer(),nrmBuf=gl.createBuffer(),uvBuf=gl.createBuffer(),idxBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,uvBuf); gl.bufferData(gl.ARRAY_BUFFER,uvs,gl.STATIC_DRAW);
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf); gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,tri,gl.STATIC_DRAW);

var tex = gl.createTexture();
function uploadTexture() {
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, drawReceipt());
  gl.generateMipmap(gl.TEXTURE_2D);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  var aniso = gl.getExtension("EXT_texture_filter_anisotropic") || gl.getExtension("WEBKIT_EXT_texture_filter_anisotropic");
  if (aniso) gl.texParameterf(gl.TEXTURE_2D, aniso.TEXTURE_MAX_ANISOTROPY_EXT, Math.min(gl.getParameter(aniso.MAX_TEXTURE_MAX_ANISOTROPY_EXT), 16));
}
uploadTexture();
gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, tex); gl.uniform1i(uT, 0);

// Update texture every second for live clock
setInterval(uploadTexture, 1000);

var eye=[0,-3,8],center=[0,-3,0];
var vMat=m4(),pMat=m4(),vpMat=m4(),ivp=m4();
lookAt(vMat,eye,center,[0,1,0]); persp(pMat,Math.PI*0.28,cssW/cssH,0.1,100);
mul(vpMat,pMat,vMat); inv(ivp,vpMat);
gl.uniformMatrix4fv(uVP,false,vpMat); gl.uniform3f(uEye,eye[0],eye[1],eye[2]);

function projPt(wx,wy,wz){var x=vpMat[0]*wx+vpMat[4]*wy+vpMat[8]*wz+vpMat[12],y=vpMat[1]*wx+vpMat[5]*wy+vpMat[9]*wz+vpMat[13],z=vpMat[2]*wx+vpMat[6]*wy+vpMat[10]*wz+vpMat[14],w=vpMat[3]*wx+vpMat[7]*wy+vpMat[11]*wz+vpMat[15];return[(x/w+1)*.5*cssW,(1-y/w)*.5*cssH,(z/w+1)*.5];}
function unprojPt(sx,sy,sz){var nx=sx/cssW*2-1,ny=1-sy/cssH*2,nz=sz*2-1;var x=ivp[0]*nx+ivp[4]*ny+ivp[8]*nz+ivp[12],y=ivp[1]*nx+ivp[5]*ny+ivp[9]*nz+ivp[13],z=ivp[2]*nx+ivp[6]*ny+ivp[10]*nz+ivp[14],w=ivp[3]*nx+ivp[7]*ny+ivp[11]*nz+ivp[15];return[x/w,y/w,z/w];}
var baseProj=projPt(0,-3,0),dragZ=baseProj[2];

/* ═══════════════════════════════════════════
   Pointer Events
   ═══════════════════════════════════════════ */

var mouseDown=false,mwx=0,mwy=0,pmwx=0,pmwy=0,mwValid=false,grabIndex=-1;

canvas.addEventListener("pointerdown",function(e){
  mouseDown=true; canvas.classList.add("grabbing"); canvas.setPointerCapture(e.pointerId);
  var best=-1,bd=70;
  for(var i=0;i<NP;i++){if(pin[i])continue;var sp=projPt(pos[i*3],pos[i*3+1],pos[i*3+2]);var d=Math.sqrt((sp[0]-e.clientX)*(sp[0]-e.clientX)+(sp[1]-e.clientY)*(sp[1]-e.clientY));if(d<bd){bd=d;best=i;}}
  grabIndex=best;
  if(best>=0){var sp=projPt(pos[best*3],pos[best*3+1],pos[best*3+2]);dragZ=sp[2];}
  var wp=unprojPt(e.clientX,e.clientY,dragZ);mwx=wp[0];mwy=wp[1];pmwx=mwx;pmwy=mwy;mwValid=true;
  dot.style.display="block";dot.style.left=e.clientX+"px";dot.style.top=e.clientY+"px";
});
canvas.addEventListener("pointermove",function(e){if(!mouseDown)return;var wp=unprojPt(e.clientX,e.clientY,dragZ);mwx=wp[0];mwy=wp[1];dot.style.left=e.clientX+"px";dot.style.top=e.clientY+"px";});
function release(){mouseDown=false;mwValid=false;grabIndex=-1;canvas.classList.remove("grabbing");dot.style.display="none";}
canvas.addEventListener("pointerup",release);
canvas.addEventListener("pointercancel",release);

/* ═══════════════════════════════════════════
   Physics
   ═══════════════════════════════════════════ */

var simTime = 0;

function simulate() {
  simTime += 0.016;
  var t = simTime;

  // Mouse delta (clamped)
  var mdx = 0, mdy = 0;
  if (mouseDown && mwValid) {
    mdx = mwx - pmwx; mdy = mwy - pmwy;
    var ml = Math.sqrt(mdx*mdx + mdy*mdy);
    if (ml > 0.5) { var sc = 0.5/ml; mdx *= sc; mdy *= sc; }
  }

  /* ── Verlet integration ── */
  for (var i = 0; i < NP; i++) {
    if (pin[i]) continue;
    var ix = i*3, iy = ix+1, iz = ix+2;

    var vx = (pos[ix] - prv[ix]) * DAMP;
    var vy = (pos[iy] - prv[iy]) * DAMP;
    var vz = (pos[iz] - prv[iz]) * DAMP;
    prv[ix] = pos[ix]; prv[iy] = pos[iy]; prv[iz] = pos[iz];

    // Row-dependent wind
    var pRow = Math.floor(i / NX);
    var rowFrac = pRow / (NY - 1);
    var windScale = 0.3 + rowFrac * 0.7;
    var wx = (Math.sin(t*0.7)*0.0004 + Math.sin(t*1.9+0.5)*0.0002 + Math.sin(t*3.2+1.2)*0.0001) * windScale;
    var wz = (Math.sin(t*0.5+1.0)*0.0007 + Math.cos(t*1.3+0.3)*0.0003 + Math.sin(t*2.7+2.0)*0.00015) * windScale;
    // Traveling ripple wave
    wz += Math.sin(t * 1.2 - rowFrac * 5.0) * 0.0005 * rowFrac;
    wx += Math.cos(t * 0.9 - rowFrac * 3.5 + 1.5) * 0.0002 * rowFrac;

    vz *= 0.965; // Extra z-damp

    pos[ix] += vx + wx;
    pos[iy] += vy - GRAV;
    pos[iz] += vz + wz;
  }

  /* ── Wide-area grab (smooth dome, no point) ── */
  if (mouseDown && grabIndex >= 0 && !pin[grabIndex]) {
    for (var i = 0; i < NP; i++) {
      if (pin[i]) continue;
      var ix = i*3, iy = ix+1;
      var dx = pos[ix] - mwx, dy = pos[iy] - mwy;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist >= GRAB_RAD && i !== grabIndex) continue;

      var tt = Math.min(dist / GRAB_RAD, 1.0);
      var inf = (1 - tt) * (1 - tt) * (1 - tt); // Cubic falloff
      if (i === grabIndex) inf = Math.max(inf, 0.7);

      var pullStr = inf * 0.25;
      var px = (mwx - pos[ix]) * pullStr;
      var py = (mwy - pos[iy]) * pullStr;

      // Also apply mouse velocity
      px += mdx * inf * 0.4;
      py += mdy * inf * 0.4;

      pos[ix] += px;
      pos[iy] += py;

      // Smooth prv so velocity builds naturally
      prv[ix] += (pos[ix] - prv[ix]) * inf * 0.15;
      prv[iy] += (pos[iy] - prv[iy]) * inf * 0.15;
    }
  }

  /* ── Constraint solving ── */
  for (var it = 0; it < ITERS; it++) {
    var start, end, step;
    if (it & 1) { start = NC-1; end = -1; step = -1; }
    else { start = 0; end = NC; step = 1; }

    for (var c = start; c !== end; c += step) {
      var a = cA[c], b = cB[c], rest = cR[c];
      var ax = a*3, bx = b*3;
      var dx = pos[bx]-pos[ax], dy = pos[bx+1]-pos[ax+1], dz = pos[bx+2]-pos[ax+2];
      var dSq = dx*dx + dy*dy + dz*dz;
      if (dSq < 1e-14) continue;
      var d = Math.sqrt(dSq);

      // Stiffer when over-stretched
      var stiff = 0.5;
      if (d > rest * 1.6) stiff = 0.72;
      else if (d > rest * 1.3) stiff = 0.6;

      var f = (d - rest) / d * stiff;
      dx *= f; dy *= f; dz *= f;

      var fa = pin[a], fb = pin[b];
      if (fa && fb) continue;
      if (!fa && !fb) {
        pos[ax]+=dx; pos[ax+1]+=dy; pos[ax+2]+=dz;
        pos[bx]-=dx; pos[bx+1]-=dy; pos[bx+2]-=dz;
      } else if (fa) {
        pos[bx]-=dx*2; pos[bx+1]-=dy*2; pos[bx+2]-=dz*2;
      } else {
        pos[ax]+=dx*2; pos[ax+1]+=dy*2; pos[ax+2]+=dz*2;
      }
    }

    // Re-apply grab during solving to prevent point formation
    if (mouseDown && grabIndex >= 0 && !pin[grabIndex]) {
      var gi = grabIndex * 3;
      pos[gi]   += (mwx - pos[gi])   * 0.12;
      pos[gi+1] += (mwy - pos[gi+1]) * 0.12;
    }
  }

  pmwx = mwx; pmwy = mwy;
}

/* ═══════════════════════════════════════════
   Normals
   ═══════════════════════════════════════════ */

function calcNormals() {
  nrm.fill(0);
  for (var t = 0; t < NI; t += 3) {
    var i0=tri[t],i1=tri[t+1],i2=tri[t+2];
    var e1x=pos[i1*3]-pos[i0*3],e1y=pos[i1*3+1]-pos[i0*3+1],e1z=pos[i1*3+2]-pos[i0*3+2];
    var e2x=pos[i2*3]-pos[i0*3],e2y=pos[i2*3+1]-pos[i0*3+1],e2z=pos[i2*3+2]-pos[i0*3+2];
    var nx=e1y*e2z-e1z*e2y,ny=e1z*e2x-e1x*e2z,nz=e1x*e2y-e1y*e2x;
    nrm[i0*3]+=nx;nrm[i0*3+1]+=ny;nrm[i0*3+2]+=nz;
    nrm[i1*3]+=nx;nrm[i1*3+1]+=ny;nrm[i1*3+2]+=nz;
    nrm[i2*3]+=nx;nrm[i2*3+1]+=ny;nrm[i2*3+2]+=nz;
  }
  for (var i = 0; i < NP; i++) {
    var x=nrm[i*3],y=nrm[i*3+1],z=nrm[i*3+2],l=Math.sqrt(x*x+y*y+z*z)||1;
    nrm[i*3]/=l; nrm[i*3+1]/=l; nrm[i*3+2]/=l;
  }
}

/* ═══════════════════════════════════════════
   Render
   ═══════════════════════════════════════════ */

function frame() {
  simulate(); calcNormals();
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf); gl.bufferData(gl.ARRAY_BUFFER,pos,gl.DYNAMIC_DRAW); gl.vertexAttribPointer(aP,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,nrmBuf); gl.bufferData(gl.ARRAY_BUFFER,nrm,gl.DYNAMIC_DRAW); gl.vertexAttribPointer(aN,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,uvBuf); gl.vertexAttribPointer(aU,2,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf); gl.drawElements(gl.TRIANGLES,NI,gl.UNSIGNED_SHORT,0);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ═══════════════════════════════════════════
   Resize
   ═══════════════════════════════════════════ */

window.addEventListener("resize",function(){
  cssW=window.innerWidth;cssH=window.innerHeight;dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.round(cssW*dpr);canvas.height=Math.round(cssH*dpr);
  gl.viewport(0,0,canvas.width,canvas.height);
  persp(pMat,Math.PI*0.28,cssW/cssH,0.1,100);mul(vpMat,pMat,vMat);inv(ivp,vpMat);
  gl.uniformMatrix4fv(uVP,false,vpMat);baseProj=projPt(0,-3,0);dragZ=baseProj[2];
});

/* ═══════════════════════════════════════════
   Init
   ═══════════════════════════════════════════ */

fetchArticles();

</script>
